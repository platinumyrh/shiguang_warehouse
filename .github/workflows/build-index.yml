name: 生成 Protobuf 数据索引

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: 检出代码
        # 将整个仓库代码检出到 runner 机器上
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml protobuf
      
      - name: 执行数据构建脚本
        # 脚本将生成 school_index.pb 到仓库根目录
        # 路径：scripts/build_data.py
        run: python scripts/build_data.py 
      
         - name: 提交到 main 分支
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ ! -f school_index.pb ]; then
            echo "错误：未找到生成的 school_index.pb 文件"
            exit 1
          fi

          git add school_index.pb
          # 检查是否有文件变动，有则提交并推送
          if git diff --cached --quiet; then
            echo "school_index.pb 没有变化，无需提交"
          else
            git commit -m "chore: auto-generate school_index.pb [skip ci]"
            git push origin main
          fi
